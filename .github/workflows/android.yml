name: Android APK Build (Goz Finance)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Cho phép nhấn nút chạy thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK (Automatic)
        run: |
          # 1. Chấp nhận tất cả các điều khoản Android SDK
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # 2. Chạy Build với mật khẩu từ GitHub Secrets
          # --password: Mật khẩu keystore
          # --keypassword: Mật khẩu key
          bubblewrap build --password "${{ secrets.KEYSTORE_PASSWORD }}" --keypassword "${{ secrets.KEY_PASSWORD }}"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Goz-Finance-APK
          path: ./*.apk
